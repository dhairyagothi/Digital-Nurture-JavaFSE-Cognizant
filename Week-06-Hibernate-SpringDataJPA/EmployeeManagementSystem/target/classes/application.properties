# Primary H2 Database Connection properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.jdbc-url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Secondary H2 Database Connection properties
secondary.datasource.url=jdbc:h2:mem:secondarydb;DB_CLOSE_DELAY=-1;MODE=MySQL
secondary.datasource.jdbc-url=jdbc:h2:mem:secondarydb;DB_CLOSE_DELAY=-1;MODE=MySQL
secondary.datasource.driverClassName=org.h2.Driver
secondary.datasource.username=sa
secondary.datasource.password=password

# JPA and Hibernate configurations
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Batch processing configuration for optimal bulk inserts/updates performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Enable override of bean definitions to allow custom data sources
spring.main.allow-bean-definition-overriding=true
